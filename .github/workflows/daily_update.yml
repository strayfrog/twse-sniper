name: Global Assets Intelligence Fetch

on:
  schedule:
    # 07:00 (對應 UTC 23:00): 美股最終收盤數據
    # 15:30 (對應 UTC 07:30): 台股收盤 + 三大法人籌碼數據
    - cron: '0 23 * * *'
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests
        
      - name: Run Python Script
        run: python twse_sniper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch stock_data.json
          git add stock_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 偵巡更新：台美股價與法人籌碼"
          git push
