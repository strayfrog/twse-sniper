name: Global Assets Daily Fetch

on:
  schedule:
    # 🌟 設定兩個時間點 (UTC 時間)
    # 23:00 UTC = 台灣早上 07:00 (抓取美股最終收盤)
    # 06:00 UTC = 台灣下午 14:00 (抓取台股最終收盤)
    - cron: '0 23,6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests
        
      - name: Run Python Script
        run: python twse_sniper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch stock_data.json
          git add stock_data.json
          # 只有在檔案真的有變動時才 Commit，避免產生無意義的紀錄
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自動更新全球資產報價"
          git push
