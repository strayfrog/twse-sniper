name: Daily Stock Sniper Report

on:
  schedule:
    # 台北時間週一至週五 16:00 執行 (UTC 08:00)
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # 允許手動觸發戰訊

permissions:
  contents: write # 關鍵：賦予寫入權限，否則無法更新 JSON 與 MD

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 核心修正：安裝所有必要通訊裝備
          pip install yfinance google-generativeai pandas

      - name: Run Sniper Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # 執行主控台腳本
          python twse_sniper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock.json report_us.md report_tw.md
          # 只有在檔案有變動時才 commit，避免 workflow 報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "📉 戰報更新: $(date +'%Y-%m-%d %H:%M')" && git push)
