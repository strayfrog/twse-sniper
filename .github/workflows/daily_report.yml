name: Global Tactical Intelligence (Data & Report)

on:
  schedule:
    - cron: '30 7 * * *'    # 台灣 15:30 (台股)
    - cron: '30 0 * * 2-6'  # 台灣 08:30 (美股)
  workflow_dispatch:

jobs:
  intelligence_mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance beautifulsoup4 pandas lxml google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: 📈 第一階段：執行數據更新與報告產出
        id: run_script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<EOF
          import requests
          from datetime import datetime
          import os

          # 1. 判斷是否為週末 (0-4 是週一到週五)
          today = datetime.now().weekday()
          if today >= 5:
              print("今天是週末，休市不執行。")
              exit(0) 

          # 2. 執行您的核心腳本
          os.system("python twse_sniper.py")
          os.system("python report_us.py")
          os.system("python report_tw.py")
          EOF

      - name: 📡 同步至 GitHub 陣地
        run: |
          git config --global user.name "Strategic-Bot"
          git config --global user.email "bot@github.com"
          git add stock_data.json report_us.md report_tw.md
          if git diff --staged --quiet; then
            echo "沒有變動需要 Commit"
          else
            git commit -m "🤖 偵巡更新：數據與報告同步"
            git pull --rebase origin main
            git push origin main
          fi

      - name: 🚀 第二階段：雲端空投 (更新 Google Drive)
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FOLDER_ID: "19HiW-LLh1KQK7IOlxJCPfwkrKmDdXDWi"
          OWNER_EMAIL: "zzzz555tw@gmail.com"
        run: |
          python - <<EOF
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # 只有在檔案存在的情況下才執行上傳 (避免休市沒產出檔案時報錯)
          files_to_upload = ['report_tw.md', 'report_us.md', 'stock_data.json']
          if not any(os.path.exists(f) for f in files_to_upload):
              print("今日無新戰報產出，跳過上傳。")
              exit(0)

          try:
              creds_json = json.loads(os.environ['GDRIVE_CREDENTIALS'])
              creds = service_account.Credentials.from_service_account_info(creds_json)
              drive_service = build('drive', 'v3', credentials=creds)
              folder_id = os.environ['FOLDER_ID']

              for file_name in files_to_upload:
                  if os.path.exists(file_name):
                      query = f"name = '{file_name}' and '{folder_id}' in parents and trashed = false"
                      results = drive_service.files().list(q=query, spaces='drive', fields='files(id)').execute()
                      items = results.get('files', [])

                      media = MediaFileUpload(file_name, resumable=True)
                      if items:
                          # 檔案已存在，執行覆蓋更新 (這不會扣機器人的 Quota)
                          file_id = items[0]['id']
                          drive_service.files().update(fileId=file_id, media_body=media).execute()
                          print(f"✅ 已更新雲端檔案: {file_name}")
                      else:
                          print(f"⚠️ 找不到雲端檔案 {file_name}，請確保您已手動上傳佔位檔。")
          except Exception as e:
              print(f"❌ 雲端同步失敗: {e}")
          EOF
