name: Global Tactical Intelligence (Data & Report)

on:
  schedule:
    - cron: '30 7 * * *'    # 台灣 15:30 (台股)
    - cron: '30 0 * * 2-6'  # 台灣 08:30 (美股週二至週六)
  workflow_dispatch:

jobs:
  intelligence_mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance beautifulsoup4 pandas lxml google-api-python-client google-auth-httplib2 google-auth-oauthlib google-generativeai pandas

      - name: 📈 第一階段：偵蒐開盤狀態與執行腳本
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python - <<EOF
          import requests
          from datetime import datetime
          import os

          # 1. 取得今日西元日期 YYYYMMDD
          today_str = datetime.now().strftime('%Y%m%d')
          print(f"--- 戰前偵蒐開始 (今日: {today_str}) ---")

          # 2. 串接證交所 OpenAPI 檢查休市
          try:
              # 您提供的 OpenAPI 連結：有價證券集中交易市場開（休）市日期
              resp = requests.get("https://openapi.twse.com.tw/v1/holidaySchedule/holidaySchedule")
              holidays = resp.json()
              
              # 檢查今天是否在休市清單 (API 中的 Date 欄位為西元 8 碼)
              is_holiday = any(h.get('Date') == today_str for h in holidays)
              
              if is_holiday:
                  reason = [h.get('Name') for h in holidays if h.get('Date') == today_str][0]
                  print(f"🛑 證交所公告今日休市 ({reason})，停止作戰。")
                  exit(0)
              
              # 週末額外保險
              if datetime.now().weekday() >= 5:
                  print("🛑 今日為週末，市場不開門，停止作戰。")
                  exit(0)

              print("✅ 偵蒐完成：今日為交易日，準備開火！")
          except Exception as e:
              print(f"⚠️ 證交所 API 連線異常 ({e})，改採基本週末判斷。")
              if datetime.now().weekday() >= 5: exit(0)

          # 3. 執行核心作戰腳本
          os.system("python twse_sniper.py")
          os.system("python report_us.py")
          os.system("python report_tw.py")
          EOF

      - name: 📡 同步至 GitHub 陣地
        run: |
          git config --global user.name "Strategic-Bot"
          git config --global user.email "bot@github.com"
          git add stock_data.json report_us.md report_tw.md
          if git diff --staged --quiet; then
            echo "沒有變動需同步"
          else
            git commit -m "🤖 偵巡更新：數據與報告同步"
            git pull --rebase origin main
            git push origin main
          fi

      - name: 🚀 第二階段：雲端空投 (覆蓋 Google Drive)
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FOLDER_ID: "19HiW-LLh1KQK7IOlxJCPfwkrKmDdXDWi"
          OWNER_EMAIL: "zzzz555tw@gmail.com"
        run: |
          python - <<EOF
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          files_to_upload = ['report_tw.md', 'report_us.md', 'stock_data.json']
          if not any(os.path.exists(f) for f in files_to_upload):
              print("找不到新產出的戰報，跳過雲端空投。")
              exit(0)

          try:
              creds_json = json.loads(os.environ['GDRIVE_CREDENTIALS'])
              creds = service_account.Credentials.from_service_account_info(creds_json)
              drive_service = build('drive', 'v3', credentials=creds)
              folder_id = os.environ['FOLDER_ID']

              for file_name in files_to_upload:
                  if os.path.exists(file_name):
                      query = f"name = '{file_name}' and '{folder_id}' in parents and trashed = false"
                      results = drive_service.files().list(q=query, spaces='drive', fields='files(id)').execute()
                      items = results.get('files', [])

                      media = MediaFileUpload(file_name, resumable=True)
                      if items:
                          # 執行覆蓋更新 (這不會扣服務帳戶那 0GB 的 Quota)
                          file_id = items[0]['id']
                          drive_service.files().update(fileId=file_id, media_body=media).execute()
                          print(f"✅ 雲端更新成功: {file_name}")
                      else:
                          print(f"❌ 錯誤: 雲端找不到佔位檔 {file_name}，請手動上傳一次。")
          except Exception as e:
              print(f"❌ 雲端同步失敗: {e}")
          EOF
