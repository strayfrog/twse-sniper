name: Global Tactical Intelligence (Data & Report)

on:
  schedule:
    # 原始排程 1：每天 07:30 UTC (台北 15:30)，鎖定台股盤後分析
    - cron: '30 7 * * *'
    # 原始排程 2：週二至週六 00:30 UTC (台北 08:30)，鎖定美股盤後分析
    - cron: '30 0 * * 2-6'
  workflow_dispatch:

jobs:
  build-and-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # 已移除 cache: 'pip'，避免因缺少 requirements.txt 導致初始化報錯

      - name: 安裝必要依賴
        run: |
          python -m pip install --upgrade pip
          # 強制更新套件，確保 Yahoo API 修復版與 Gemini SDK 同步
          pip install --upgrade yfinance google-generativeai pandas pandas_ta requests

      - name: 執行數據分析與報告產出
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python twse_sniper.py

      - name: 自動提交更新 (Git Auto-commit)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: Update stock data $(date +'%Y-%m-%d')"
          git push
        continue-on-error: true
