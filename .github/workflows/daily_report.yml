name: Strategic Report Automation

on:
  push:
    paths:
      - 'stock_data.json'
  workflow_dispatch:

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    # 【關鍵修正】授權 GitHub Actions 寫入權限，否則無法 Push 報告
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Strategic Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python report_generator.py

      - name: Commit and Push Report
        # 這個步驟會把產生的 latest_report.md 存回 GitHub
        run: |
          git config --global user.name "Strategic-Bot"
          git config --global user.email "bot@github.com"
          git add latest_report.md
          # 檢查是否有變更，若無則跳過，避免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "📡 Update Latest Strategic Report" && git push)
