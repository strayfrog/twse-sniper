name: Global Tactical Intelligence (Data Fetch Only)

on:
  schedule:
# 1. 美股收盤情報：改在 UTC 23:17 (台灣時間 07:17)
    # 避開 UTC 23:00 的大排隊，增加準點率
    - cron: '17 23 * * *'
    
    # 2. 台股法人情報：改在 UTC 07:45 (台灣時間 15:45)
    # 延後 15 分鐘是為了確保證交所數據已經完全「開牌」並寫入 JSON
    - cron: '27 7 * * *'
  workflow_dispatch:

jobs:
  intelligence_mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests yfinance beautifulsoup4 pandas lxml google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: 📈 第一階段：偵蒐開盤狀態與擷取數據
        run: |
          python - << 'EOF'
          import requests
          from datetime import datetime, timedelta, timezone
          import subprocess
          import sys

          # 強制鎖定台灣時間
          tw_tz = timezone(timedelta(hours=8))
          now_tw = datetime.now(tw_tz)
          today_str = now_tw.strftime('%Y%m%d')
          weekday = now_tw.weekday()
          
          print(f"--- 戰前偵蒐開始 (今日台灣時間: {today_str}) ---")

          # 1. 週末判斷：只有週日才全面停止 (因為六日美股都休盤，週日早上不會有新數據)
          if weekday == 6:
              print("🛑 今日為週日，全球市場皆休市，停止作戰。")
              sys.exit(0)
          elif weekday == 5:
              print("📡 今日為週六，台股休市，但需核實「美股週五收盤戰果」，准許放行！")

          # 2. 台股休市判斷：即使台股休市，也不中斷程式，確保美股能正常抓取
          try:
              resp = requests.get("https://openapi.twse.com.tw/v1/holidaySchedule/holidaySchedule", timeout=10)
              holidays = resp.json()
              is_holiday = any(h.get('Date') == today_str for h in holidays)
              
              if is_holiday:
                  reason = [h.get('Name') for h in holidays if h.get('Date') == today_str][0]
                  print(f"⚠️ 證交所公告今日台股休市 ({reason})，但將持續偵蒐美股動態！")
              else:
                  if weekday < 5:
                      print("✅ 偵蒐完成：今日台美皆為交易日，準備開火！")
          except Exception as e:
              print(f"⚠️ 證交所 API 連線異常 ({e})，忽略台股休市判斷，繼續執行。")

          print("🚀 啟動 twse_sniper.py ...")
          exit_code = subprocess.call([sys.executable, "twse_sniper.py"])
          if exit_code != 0:
              print(f"❌ twse_sniper.py 執行崩潰！錯誤代碼: {exit_code}")
              sys.exit(1)
          EOF

      - name: 📡 同步 JSON 至 GitHub 陣地
        run: |
          git config --global user.name "Strategic-Bot"
          git config --global user.email "bot@github.com"
          git add stock_data.json
          if git diff --staged --quiet; then
            echo "沒有變動需同步"
          else
            git commit -m "🤖 偵巡更新：純數據 JSON 同步"
            git pull --rebase origin main
            git push origin main
          fi

      - name: 🚀 第二階段：JSON 雲端空投 (覆蓋 / 新建 Google Drive)
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FOLDER_ID: "19HiW-LLh1KQK7IOlxJCPfwkrKmDdXDWi"
        run: |
          python - << 'EOF'
          import os, json, sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          file_name = 'stock_data.json'
          if not os.path.exists(file_name):
              print("❌ 找不到數據檔，跳過雲端空投。")
              sys.exit(0)

          try:
              creds_json = json.loads(os.environ['GDRIVE_CREDENTIALS'])
              creds = service_account.Credentials.from_service_account_info(creds_json)
              drive_service = build('drive', 'v3', credentials=creds)
              folder_id = os.environ['FOLDER_ID']

              query = f"name = '{file_name}' and '{folder_id}' in parents and trashed = false"
              results = drive_service.files().list(q=query, spaces='drive', fields='files(id)').execute()
              items = results.get('files', [])

              media = MediaFileUpload(file_name, resumable=True)
              if items:
                  file_id = items[0]['id']
                  drive_service.files().update(fileId=file_id, media_body=media).execute()
                  print(f"✅ 雲端覆蓋成功: {file_name}")
              else:
                  print(f"⚠️ 找不到舊檔，建立新檔: {file_name}")
                  file_metadata = {'name': file_name, 'parents': [folder_id]}
                  drive_service.files().create(body=file_metadata, media_body=media, fields='id').execute()
                  print(f"✅ 雲端新建成功: {file_name}")
          except Exception as e:
              print(f"❌ 雲端同步崩潰: {e}")
              sys.exit(1)
          EOF
