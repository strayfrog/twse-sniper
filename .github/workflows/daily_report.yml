name: Global Tactical Intelligence (Data & Report)

on:
  schedule:
    # 原始排程 1：每天 07:30 UTC (台北 15:30)
    - cron: '30 7 * * *'
    # 原始排程 2：週二至週六 00:30 UTC (台北 08:30)
    - cron: '30 0 * * 2-6'
  workflow_dispatch:

jobs:
  build-and-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4 # 升級至 v4 以獲取更好性能

      - name: 設定 Python 環境 (升級至 3.12)
        uses: actions/setup-python@v5 # 升級至 v5
        with:
          python-version: '3.12'

      - name: 安裝必要依賴
        run: |
          python -m pip install --upgrade pip
          # 先安裝基礎套件
          pip install --upgrade yfinance google-generativeai pandas requests
          # 安裝 pandas-ta (Python 3.12 下將能正確抓取最新版)
          pip install --upgrade pandas-ta

      - name: 執行數據分析與報告產出
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python twse_sniper.py

      - name: 自動提交更新 (Git Auto-commit)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: Update stock data $(date +'%Y-%m-%d')"
          git push
        continue-on-error: true
