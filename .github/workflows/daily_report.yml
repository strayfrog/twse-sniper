name: Strategic Report Automation

on:
  schedule:
    # 台灣時間 08:00 (UTC 00:00)
    - cron: '0 0 * * *'
    # 台灣時間 16:00 (UTC 08:00)
    - cron: '0 8 * * *'
  push:
    paths:
      - 'stock_data.json'
  workflow_dispatch:

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Strategic Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python report_generator.py

      - name: Commit and Push Report
        run: |
          git config --global user.name "Strategic-Bot"
          git config --global user.email "bot@github.com"
          git add latest_report.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "📡 Update Latest Strategic Report" && git push)
