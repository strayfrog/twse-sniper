name: Strategic Report Automation

on:
  push:
    paths:
      - 'stock_data.json' # 當數據更新時自動觸發
  workflow_dispatch:      # 允許手動從 GitHub 介面執行

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/python-version@v4
        with:
          python-version: '3.11' # 提升 Python 版本以支援最新 SDK

      - name: Install Dependencies
        run: |
          # 核心修正：安裝 Google 最新一代 GenAI 套件
          pip install google-genai requests

      - name: Run Strategic Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python report_generator.py
