name: Global Tactical Intelligence (Data & Report)

on:
  schedule:
    - cron: '30 7 * * 1-5'    # 台北 15:30 (台股週一至週五)
    - cron: '30 0 * * 2-6'    # 台北 08:30 (美股週二至週六)
  workflow_dispatch:

jobs:
  intelligence_mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 注意：這裡嚴禁加入 cache 屬性，避免因找不到檔案而報錯

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 強制安裝所有必要戰略模組
          python -m pip install requests yfinance beautifulsoup4 pandas lxml \
            google-api-python-client google-auth-httplib2 google-auth-oauthlib \
            google-generativeai

      - name: 📈 執行戰略分析任務
        env:
          # 統一金鑰名稱，確保 Python 讀得到
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 這裡直接執行 Python，不再用 heredoc 包裹，避免環境變數傳遞失敗
          python twse_sniper.py
          # 如果你的主程式沒寫好呼叫，補上這兩行，但建議由 twse_sniper.py 統一調度
          # python report_us.py
          # python report_tw.py

      - name: 📡 同步至 GitHub 陣地
        run: |
          git config --global user.name "Strategic-Bot"
          git config --global user.email "bot@github.com"
          git add stock_data.json report_us.md report_tw.md
          if git diff --staged --quiet; then
            echo "沒有變動需同步"
          else
            git commit -m "🤖 偵巡更新：數據與報告同步"
            git push origin main
          fi
