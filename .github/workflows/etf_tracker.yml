name: 00981A Intelligence Tracker

on:
  schedule:
    # 台灣時間 18:30 執行 (UTC 時間 10:30)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-etf:
    runs-on: ubuntu-latest
    steps:
      # 升級到 v4 (解決黃色警告)
      - uses: actions/checkout@v4

      # 升級到 v5 (解決黃色警告)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 補上 beautifulsoup4 確保 pandas 的 read_html 能順利執行
          pip install requests pandas lxml html5lib beautifulsoup

      - name: Run ETF Tracker Script
       
        run: python etf_00981A_tracker.py

      - name: Commit and push CSV database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add 00981A_holdings.csv
          # 如果沒有變動就不 commit，有變動才 commit 並 push
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新 00981A 籌碼歷史資料" && git push)
