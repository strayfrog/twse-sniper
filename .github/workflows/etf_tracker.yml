name: 00981A Intelligence Tracker

on:
  schedule:
    # 台灣時間 18:30 執行 (UTC 時間 10:30)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-etf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas lxml html5lib

      - name: Run ETF Tracker Script
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python etf_00981A_tracker.py

      - name: Commit and push CSV database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add 00981A_holdings.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新 00981A 籌碼歷史資料" && git push)
