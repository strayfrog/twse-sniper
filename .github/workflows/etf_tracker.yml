name: 00981A Intelligence Tracker

on:
  schedule:
    # 台灣時間 18:30 執行 (UTC 時間 10:30)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-etf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 補上 Selenium 與 Webdriver-Manager 裝備
          pip install requests pandas lxml html5lib beautifulsoup4 selenium webdriver-manager google-api-python-client google-auth-httplib2 google-auth-oauthlib

      # 【新增的裝甲車引擎區塊】
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          
      - name: Run ETF Tracker Script
        run: python etf_00981A_tracker.py

 
  
      - name: Commit and push CSV database
        run: |
          # 🔦 探照燈：印出目前目錄下所有 CSV 檔案，看 Python 到底有沒有生出來！
          echo "==== 戰區檔案盤點清單 ===="
          ls -la *_holdings.csv || echo "沒有找到任何 CSV"
          echo "========================"
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # 🚨 升級無死角抓取：加上引號讓 git 自己去比對所有檔案
          git add "*_holdings.csv"
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新四大主動 ETF 籌碼歷史資料" && git push)

      - name: 🚀 最終階段：CSV 籌碼情報雲端空投
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FOLDER_ID: "19HiW-LLh1KQK7IOlxJCPfwkrKmDdXDWi"
        run: |
          python - << 'EOF'
          import os, json, sys, glob
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          try:
              creds_json = json.loads(os.environ['GDRIVE_CREDENTIALS'])
              creds = service_account.Credentials.from_service_account_info(creds_json)
              drive_service = build('drive', 'v3', credentials=creds)
              folder_id = os.environ['FOLDER_ID']

              # 🚨 關鍵修改 2：使用 glob 模組，自動搜尋目錄下所有 CSV 檔案
              csv_files = glob.glob('*_holdings.csv')
              
              if not csv_files:
                  print("❌ 找不到任何 CSV 數據檔，跳過雲端空投。")
                  sys.exit(0)

              # 🚨 關鍵修改 3：啟動迴圈，把找到的 4 個檔案一個一個空投上去
              for file_name in csv_files:
                  print(f"📦 準備空投: {file_name}")
                  
                  # 尋找雲端硬碟中是否已有同名檔案
                  query = f"name = '{file_name}' and '{folder_id}' in parents and trashed = false"
                  results = drive_service.files().list(q=query, spaces='drive', fields='files(id)').execute()
                  items = results.get('files', [])

                  media = MediaFileUpload(file_name, mimetype='text/csv', resumable=True)
                  
                  if items:
                      file_id = items[0]['id']
                      drive_service.files().update(fileId=file_id, media_body=media).execute()
                      print(f"✅ 雲端覆蓋成功: {file_name}")
                  else:
                      file_metadata = {'name': file_name, 'parents': [folder_id]}
                      drive_service.files().create(body=file_metadata, media_body=media, fields='id').execute()
                      print(f"✅ 雲端新建成功: {file_name}")
                      
          except Exception as e:
              print(f"❌ 雲端同步崩潰: {e}")
              sys.exit(1)
          EOF
